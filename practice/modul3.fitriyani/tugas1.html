<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Users JSONPlaceholder</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body{
        background:#FFF5EE; /* Peach muda */
    }

    .card{
        transition:0.3s;
        border:none;
        border-radius:15px;
        background:#FFE5D4; /* Warna peach */
    }

    .card:hover{
        transform:translateY(-5px);
        box-shadow:0 10px 20px rgba(255, 170, 120, 0.35);
    }

    .avatar{
        width:70px;
        height:70px;
        border-radius:50%;
        background:#FFB38A; /* Peach tua */
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:28px;
        font-weight:bold;
        margin:auto;
    }

    h1{
        color:#C96A4A;
        font-weight:bold;
    }

    h4{
        color:#D46A6A;
    }

    h6{
        color:#C96A4A;
    }

    a{
        color:#D46A6A;
        text-decoration:none;
    }

    a:hover{
        color:#A84C3A;
    }

    hr{
        border-color:#F5B89A;
    }
</style>

</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-4">
        Data Pengguna
    </h1>

    <div class="row" id="users"></div>

</div>

<script>

fetch("https://jsonplaceholder.typicode.com/users")
.then(response => response.json())
.then(data=>{

    let tampil="";

    data.forEach(user=>{

        tampil+=`

        <div class="col-md-6 col-lg-4 mb-4">

            <div class="card shadow h-100">

                <div class="card-body">

                    <div class="avatar mb-3">
                        ${user.name.charAt(0)}
                    </div>

                    <h4 class="text-center">${user.name}</h4>

                    <hr>

                    <p><strong>Username :</strong> ${user.username}</p>

                    <p><strong>Email :</strong> ${user.email}</p>

                    <p><strong>Telepon :</strong> ${user.phone}</p>

                    <p><strong>Website :</strong> 
                        <a href="https://${user.website}" target="_blank">
                            ${user.website}
                        </a>
                    </p>

                    <p>
                        <strong>Alamat :</strong><br>
                        ${user.address.street},
                        ${user.address.suite}<br>
                        ${user.address.city}<br>
                        ${user.address.zipcode}
                    </p>

                    <hr>

                    <h6>Perusahaan</h6>

                    <p><strong>${user.company.name}</strong></p>

                    <small>${user.company.catchPhrase}</small>

                </div>

            </div>

        </div>

        `;

    });

    document.getElementById("users").innerHTML=tampil;

});

</script>

</body>
</html>
