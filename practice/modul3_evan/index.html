<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Users</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        min-height: 100vh;
        padding: 40px;
      }

      .container {
        max-width: 1200px;
        margin: auto;
        background: white;
        border-radius: 15px;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 10px;
      }

      p {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 10px;
      }

      thead {
        background: #0d6efd;
        color: white;
      }

      th {
        padding: 15px;
        text-align: left;
        font-size: 15px;
      }

      td {
        padding: 14px;
        border-bottom: 1px solid #ddd;
        color: #444;
      }

      tbody tr:nth-child(even) {
        background: #f8f9fa;
      }

      tbody tr:hover {
        background: #dbeafe;
        transition: 0.3s;
        cursor: pointer;
      }

      .badge {
        background: #198754;
        color: white;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
      }

      .email {
        color: #0d6efd;
        text-decoration: none;
      }

      .email:hover {
        text-decoration: underline;
      }

      .footer {
        text-align: center;
        margin-top: 20px;
        color: #555;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }

        .container {
          overflow-x: auto;
        }

        table {
          min-width: 900px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📋 Data Pengguna</h1>
      <p>Data diambil dari JSONPlaceholder API menggunakan JavaScript</p>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nama</th>
            <th>Username</th>
            <th>Email</th>
            <th>Kota</th>
            <th>Perusahaan</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="user-table-body">
          <tr>
            <td colspan="7" style="text-align: center;">Memuat data...</td>
          </tr>
        </tbody>
      </table>

      <div class="footer" id="user-footer">
        Total Data : <strong>0</strong> Users
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        fetch("https://jsonplaceholder.typicode.com/users")
          .then(response => response.json())
          .then(users => {
            const tbody = document.getElementById("user-table-body");
            let rows = "";
            users.forEach(user => {
              rows += `
          <tr>
            <td>${user.id}</td>
            <td><strong>${user.name}</strong></td>
            <td>${user.username}</td>
            <td><a class="email" href="mailto:${user.email}">${user.email}</a></td>
            <td>${user.address.city}</td>
            <td>${user.company.name}</td>
            <td><span class="badge">Aktif</span></td>
          </tr>`;
            });
            tbody.innerHTML = rows;
            
            document.getElementById("user-footer").innerHTML = `Total Data : <strong>${users.length}</strong> Users`;
          })
          .catch(error => {
            console.error("Error fetching data:", error);
            document.getElementById("user-table-body").innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Gagal memuat data.</td></tr>';
          });
      });
    </script>
  </body>
</html>
