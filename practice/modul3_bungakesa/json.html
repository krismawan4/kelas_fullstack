<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar User</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#FFE4EF,#FFF7FA);
            min-height:100vh;
        }

        h2{
            color:#E75480;
            font-weight:700;
        }

        .card{
            border:none;
            border-radius:25px;
            background:#fff;
            box-shadow:0 10px 25px rgba(231,84,128,.18);
            transition:.3s;
            overflow:hidden;
        }

        .card:hover{
            transform:translateY(-8px);
            box-shadow:0 18px 35px rgba(231,84,128,.28);
        }

        .card-header{
            background:linear-gradient(90deg,#FF9FC1,#FFD6E5);
            color:white;
            text-align:center;
            font-weight:bold;
            font-size:20px;
            border:none;
            padding:18px;
        }

        .card-body{
            padding:20px;
        }

        .info-box{
            background:#FFF0F6;
            border:1px solid #FFD6E5;
            border-radius:15px;
            padding:12px 15px;
            margin-bottom:12px;
            transition:.3s;
        }

        .info-box:hover{
            background:#FFE3EE;
            transform:scale(1.02);
        }

        .label{
            color:#E75480;
            font-weight:600;
            font-size:14px;
            margin-bottom:3px;
        }

        .value{
            color:#555;
            font-size:14px;
            word-break:break-word;
        }

        .alert{
            border-radius:20px;
        }

        .footer-card{
            text-align:center;
            color:#E75480;
            font-size:13px;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <h2 class="text-center mb-5">🌸 Daftar User 🌸</h2>

    <div class="row g-4" id="userList">

    </div>

</div>

<script>
fetch('https://jsonplaceholder.typicode.com/users')
  .then(response => response.json())
  .then(users => {

    const userList = document.getElementById('userList');

    users.forEach(user => {

      userList.innerHTML += `
        <div class="col-md-6 col-lg-4">

            <div class="card h-100">

                <div class="card-header">
                    👩 ${user.name}
                </div>

                <div class="card-body">

                    <div class="info-box">
                        <div class="label">👤 Username</div>
                        <div class="value">${user.username}</div>
                    </div>

                    <div class="info-box">
                        <div class="label">📧 Email</div>
                        <div class="value">${user.email}</div>
                    </div>

                    <div class="info-box">
                        <div class="label">📱 Telepon</div>
                        <div class="value">${user.phone}</div>
                    </div>

                    <div class="info-box">
                        <div class="label">🌐 Website</div>
                        <div class="value">${user.website}</div>
                    </div>

                    <div class="info-box">
                        <div class="label">🏙️ Kota</div>
                        <div class="value">${user.address.city}</div>
                    </div>

                    <div class="info-box">
                        <div class="label">🏢 Perusahaan</div>
                        <div class="value">${user.company.name}</div>
                    </div>

                    <div class="footer-card">
                        💖 Data berhasil diambil dari JSON API
                    </div>

                </div>

            </div>

        </div>
      `;
    });

  })
  .catch(error => {

    document.getElementById('userList').innerHTML = `
        <div class="col-12">
            <div class="alert alert-danger text-center shadow">
                ❌ Gagal mengambil data!
            </div>
        </div>
    `;

    console.error(error);

  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
